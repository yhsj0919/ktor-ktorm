version: "3.9"
services:
  weigh3-mysql:
    image: yhsj0919/weigh3-mysql:latest
    container_name: weigh3-mysql
    restart: unless-stopped
    ports:
      - "18080:80"
    volumes:
      - /opt/weigh3-mysql/Image:/app/Image
      - /opt/weigh3-mysql/models:/app/models
    environment:
      - TZ=Asia/Shanghai